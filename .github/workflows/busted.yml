name: busted tests

# Controls when the workflow will run
on:
  # Triggers the workflow
  # - on push
  # - or pull request but only for the "main" branch
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-busted:
    runs-on: ubuntu-latest
    container:
      image: xyzzycgn/busted-factorio:1.0.0

    steps:
      - uses: actions/checkout@v6

      # Runs busted
      - name: Run Busted
        run: |
          eval "$(luarocks path --bin)"
          busted --run=CI